  <head>

    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://pomodoro.kajkowalski.nl" />
    <meta
      property="twitter:title"
      content="🍅 Focus Timer - Pomodoro Technique"
    />
    <meta
      property="twitter:description"

    />

      property="twitter:image"

    />

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#e74c3c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Focus Timer" />
    <link
      rel="apple-touch-icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍅</text></svg>"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍅</text></svg>"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 class="title">🍅 Focus Timer</h1>
        <p class="subtitle">Stay focused with the Pomodoro Technique</p>
      </header>

      <main class="main">
        <div class="timer-section">
          <div class="timer-mode">
            <span id="current-mode" class="mode-text">Focus Time</span>
            <span id="session-count" class="session-counter">Session 1</span>
          </div>

          <div class="timer-circle">
            <svg
              class="progress-ring"
              width="280"
              height="280"
              viewBox="0 0 280 280"
              aria-hidden="true"
            >
              <circle
                class="progress-ring__background"
                cx="140"
                cy="140"
                r="130"
              ></circle>
              <circle
                class="progress-ring__progress"
                cx="140"
                cy="140"
                r="130"
              ></circle>
            </svg>
            <div class="timer-content">
              <div
                id="timer-display"
                class="timer-display"
                role="timer"
                aria-label="Time remaining"
              >
                25:00
              </div>
              <div id="timer-label" class="timer-label">minutes</div>
            </div>
          </div>

          <!-- Polite live region: announces mode changes and completion to
               screen readers, not the per-second countdown. -->
          <div
            id="timer-status"
            class="sr-only"
            role="status"
            aria-live="polite"
            aria-atomic="true"
          ></div>

          <div class="controls">
            <button
              id="start-button"
              class="btn btn-primary"
              aria-label="Start timer"
              aria-keyshortcuts="Space"
            >
              <i data-lucide="play" class="btn-icon"></i>
              <span class="btn-text">Start</span>
            </button>
            <button
              id="pause-button"
              class="btn btn-secondary"
              style="display: none"
              aria-label="Pause timer"
              aria-keyshortcuts="Space"
            >
              <i data-lucide="pause" class="btn-icon"></i>
              <span class="btn-text">Pause</span>
            </button>
            <button
              id="reset-button"
              class="btn btn-outline"
              aria-label="Reset timer"
              aria-keyshortcuts="R"
            >
              <i data-lucide="rotate-ccw" class="btn-icon"></i>
              <span class="btn-text">Reset</span>
            </button>
          </div>
        </div>

        <div class="settings-section">
          <div class="settings-toggle">
            <button
              id="settings-toggle-btn"
              class="settings-btn"
              aria-haspopup="dialog"
              aria-controls="settings-panel"
              aria-expanded="false"
              aria-keyshortcuts="S"
            >
              <i data-lucide="settings" class="settings-icon"></i>
              Settings
            </button>
          </div>

          <dialog
            id="settings-panel"
            class="settings-panel"
            aria-labelledby="settings-title"
          >
            <div class="settings-header">
              <h2 id="settings-title" class="settings-title">Settings</h2>
              <button
                id="settings-close-btn"
                class="settings-close"
                aria-label="Close settings"
              >
                <i data-lucide="x"></i>
              </button>
            </div>

            <div class="settings-grid">
              <div class="setting-item">
                <label for="focus-duration">Focus Duration</label>
                <div class="input-group">
                  <input
                    type="number"
                    id="focus-duration"
                    value="25"
                    min="1"
                    max="60"
                    inputmode="numeric"
                  />
                  <span class="input-suffix">min</span>
                </div>
              </div>

              <div class="setting-item">
                <label for="short-break-duration">Short Break</label>
                <div class="input-group">
                  <input
                    type="number"
                    id="short-break-duration"
                    value="5"
                    min="1"
                    max="30"
                    inputmode="numeric"
                  />
                  <span class="input-suffix">min</span>
                </div>
              </div>

              <div class="setting-item">
                <label for="long-break-duration">Long Break</label>
                <div class="input-group">
                  <input
                    type="number"
                    id="long-break-duration"
                    value="15"
                    min="1"
                    max="60"
                    inputmode="numeric"
                  />
                  <span class="input-suffix">min</span>
                </div>
              </div>

              <div class="setting-item">
                <label for="long-break-interval">Long Break After</label>
                <div class="input-group">
                  <input
                    type="number"
                    id="long-break-interval"
                    value="4"
                    min="2"
                    max="10"
                    inputmode="numeric"
                  />
                  <span class="input-suffix">sessions</span>
                </div>
              </div>
            </div>

            <div class="settings-options">
              <div class="option-item">
                <input type="checkbox" id="auto-start-breaks" checked />
                <label for="auto-start-breaks">Auto-start breaks</label>
              </div>

              <div class="option-item">
                <input type="checkbox" id="auto-start-focus" checked />
                <label for="auto-start-focus">Auto-start focus sessions</label>
              </div>

              <div class="option-item">
                <input type="checkbox" id="sound-enabled" checked />
                <label for="sound-enabled">Sound notifications</label>
              </div>
            </div>

            <p class="shortcut-hint">
              Shortcuts:
              <kbd>Space</kbd> start/pause · <kbd>R</kbd> reset ·
              <kbd>S</kbd> settings · <kbd>Esc</kbd> close
            </p>
          </dialog>
        </div>

        <div class="stats-section">
          <h3>Today's Progress</h3>
          <div class="stats-grid">
            <div class="stat-item">
              <div class="stat-number" id="completed-sessions">0</div>
              <div class="stat-label">Completed Sessions</div>
            </div>
            <div class="stat-item">
              <div class="stat-number" id="total-focus-time">0h 0m</div>
              <div class="stat-label">Focus Time</div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="./js/main.ts"></script>
  </body>
</html>
